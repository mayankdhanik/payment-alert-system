# ===================================================
# Payment Alert System — Application Configuration
# ===================================================

server.port=8080
spring.application.name=payment-alert-system

# ===================================================
# DATABASE — H2 In-Memory (default, zero install)
# Switch to MySQL or Oracle by uncommenting below.
# ===================================================
spring.datasource.url=jdbc:h2:file:./data/payment_alert_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 browser console — visit http://localhost:8080/h2-console (JDBC URL above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------
# MySQL (uncomment + comment H2 block above to use)
# ---------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/payment_alert_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ---------------------------------------------------
# Oracle DB (uncomment + comment H2 block above to use)
# Requires ojdbc11.jar installed in local Maven repo.
# ---------------------------------------------------
