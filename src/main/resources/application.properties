# ===================================================
# Payment Alert System — Application Configuration
# ===================================================

server.port=8080
spring.application.name=payment-alert-system

# ===================================================
# DATABASE — H2 In-Memory (default, zero install)
# Switch to MySQL or Oracle by uncommenting below.
# ===================================================
# ===================================================
# DATABASE
# Local dev  → H2 in-memory (zero install)
# Production → MySQL (freemysqlhosting.net)
# ===================================================
spring.datasource.url=${DATABASE_URL:jdbc:oracle:thin:@localhost:1521:XE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:oracle.jdbc.OracleDriver}
spring.datasource.username=${DATABASE_USERNAME:payment_user}
spring.datasource.password=${DATABASE_PASSWORD:payment123}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.OracleDialect}

# H2 console — local only
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# ---------------------------------------------------
# MySQL (uncomment + comment H2 block above to use)
# ---------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/payment_alert_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
