# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
# spring.jpa.hibernate.ddl-auto=update

# ===================================================
# JPA / Hibernate
# ===================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================
# Mail — mock mode ON by default (no real SMTP needed)
# To send real emails: set mock-email=false and fill SMTP creds
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:mayankdhanik15@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

alert.system.mock-email=${ALERT_SYSTEM_MOCK_EMAIL:true}
alert.system.from-address=mayankdhanik15@gmail.com
alert.system.from-name=Payment Alert System

# ===================================================
# SMS — Twilio
# ===================================================
alert.system.mock-sms=${ALERT_SYSTEM_MOCK_SMS:true}
alert.system.twilio.account-sid=${ALERT_SYSTEM_TWILIO_ACCOUNT_SID:}
alert.system.twilio.auth-token=${ALERT_SYSTEM_TWILIO_AUTH_TOKEN:}
alert.system.twilio.from-number=${ALERT_SYSTEM_TWILIO_FROM_NUMBER:}

# ===================================================
# Logging
# ===================================================
logging.level.com.payments.alert=DEBUG
logging.level.org.springframework.mail=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
